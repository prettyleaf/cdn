name: Update CDN IP Lists

on:
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    env:
      NETWORKSDB_API_KEY: ${{ secrets.NETWORKSDB_API_KEY }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install mihomo CLI
        run: |
          FALLBACK_VERSION="v1.19.9"
          MIHOMO_VERSION=$(curl -sfL --retry 3 https://api.github.com/repos/MetaCubeX/mihomo/releases/latest | jq -r '.tag_name') || true
          if [ -z "$MIHOMO_VERSION" ] || [ "$MIHOMO_VERSION" = "null" ]; then
            echo "::warning::Failed to fetch latest mihomo version, using fallback: $FALLBACK_VERSION"
            MIHOMO_VERSION="$FALLBACK_VERSION"
          fi
          echo "Installing mihomo $MIHOMO_VERSION"
          curl -fSL --retry 3 -o mihomo.gz "https://github.com/MetaCubeX/mihomo/releases/download/${MIHOMO_VERSION}/mihomo-linux-amd64-${MIHOMO_VERSION}.gz"
          gunzip mihomo.gz
          chmod +x mihomo
          sudo mv mihomo /usr/local/bin/

      - name: Generate CDN lists with MRS
        run: python3 scripts/update_cdn_lists.py --mrs

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Generate GeoIP dat files
        run: python3 scripts/generate_geoip_dat.py

      - name: Set commit name
        run: echo "COMMIT_NAME=$(date -u +%Y%m%d%H%M)" >> $GITHUB_ENV

      - name: Commit and push if changes exist
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "${{ env.COMMIT_NAME }}"
          file_pattern: "**/*.txt **/*.csv **/*.json **/*.dat **/*.mrs"
